services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:14.0.0
    container_name: mailserver
    restart: unless-stopped
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "993:993"
    networks:
      mailserver:
        aliases:
          - mail.${DOMAIN}
      caddy:
        aliases:
          - mail.${DOMAIN}
    depends_on:
      caddy:
        condition: service_healthy
    environment:
      ENABLE_RSPAMD: 1
      ENABLE_CLAMAV: 1
      ENABLE_FAIL2BAN: 1
      ENABLE_POSTGREY: 0
      ENABLE_SPAMASSASSIN: 0
      SPOOF_PROTECTION: 1
      RSPAMD_CHECK_AUTHENTICATED: 1
      ENABLE_SRS: 0
      # Rspamd replaces the legacy OpenDKIM/OpenDMARC/policyd-spf stack; keep
      # those disabled to avoid duplicate or conflicting policy checks.
      ENABLE_OPENDKIM: 0
      ENABLE_OPENDMARC: 0
      ENABLE_POLICYD_SPF: 0
      PERMIT_DOCKER: network
      SSL_TYPE: manual
      OVERRIDE_HOSTNAME: mail.${DOMAIN}
      DOMAIN: ${DOMAIN}
      MAIL_DOMAIN: ${MAIL_DOMAIN}
      STACK_ADMIN_EMAIL: ${STACK_ADMIN_EMAIL}
      STACK_ADMIN_PASSWORD: ${STACK_ADMIN_PASSWORD}
      VAULTWARDEN_SMTP_PASSWORD: ${VAULTWARDEN_SMTP_PASSWORD}
      MASTODON_SMTP_PASSWORD: ${MASTODON_SMTP_PASSWORD:-}
      POSTMASTER_ADDRESS: postmaster@${MAIL_DOMAIN}
      ACCOUNT_PROVISIONER: FILE
      DOVECOT_MAILBOX_FORMAT: maildir
      DOVECOT_USER_ATTRS: =home=/var/mail/%Ln,=mail=maildir:~/Maildir,=uid=5000,=gid=5000
      ENABLE_OAUTH2: 1
      ENABLE_QUOTAS: 1
      ENABLE_AMAVIS: 0
      POSTFIX_MESSAGE_SIZE_LIMIT: 50000000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    entrypoint: ["/bin/bash", "/tmp/docker-mailserver/entrypoint-wrapper.sh"]
    volumes:
      - mailserver_data:/var/mail/
      - /etc/localtime:/etc/localtime:ro
      - caddy_certs:/caddy-certs:ro
      - ./configs/mailserver/find-certs.sh:/tmp/docker-mailserver/find-certs.sh:ro
      - ./configs/mailserver/setup-dkim.sh:/tmp/docker-mailserver/setup-dkim.sh:ro
      - ./configs/mailserver/entrypoint-wrapper.sh:/tmp/docker-mailserver/entrypoint-wrapper.sh:ro
      - ./configs/mailserver/dovecot-oauth2.conf.ext:/etc/dovecot/dovecot-oauth2.conf.ext:ro
    deploy:
      resources:
        limits:
          memory: ${MAILSERVER_MEMORY_LIMIT:-3G}
          cpus: '${MAILSERVER_CPU_LIMIT:-2.0}'
    healthcheck:
      test: ["CMD-SHELL", "ss -ltn | grep -E ':25|:587|:993' && supervisorctl status | grep -E 'postfix.*RUNNING' && supervisorctl status | grep -E 'dovecot.*RUNNING'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 300s
